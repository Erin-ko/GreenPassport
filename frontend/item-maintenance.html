<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>維修紀錄 | 綠色循環經濟護照</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='passport.html'">
                🌱 綠色循環經濟護照
            </div>
            <ul class="nav-links">
                <li><a href="passport.html" class="active">物品收藏庫</a></li>
                <li><a href="add-item.html">新增物品護照</a></li>
                <li><a href="reminders.html">提醒通知</a></li>
                <li><a href="board.html">互助募集看板</a></li>
                <li><a href="messages.html">聯絡私訊</a></li>
                <li><button class="btn-logout" onclick="logout()">登出</button></li>
            </ul>
        </div>
    </header>

    <main style="max-width: 800px; margin-left: auto; margin-right: auto;">
        <!-- 新增維修保養紀錄表單 -->
        <section class="glass-card" style="margin-top: 2rem; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.3rem; font-weight: 600; color: var(--text-main);" id="maintenanceTitle">新增維修保養紀錄</h3>
            <form id="recordForm">
                <input type="hidden" id="recordItemId">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem;">
                    <div class="form-group">
                        <label for="recordDate">維修日期</label>
                        <input type="date" id="recordDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="recordCost">維修費用 (NTD) 💰</label>
                        <input type="number" id="recordCost" class="form-control" placeholder="請輸入金額" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label for="recordDesc">維修項目說明</label>
                    <input type="text" id="recordDesc" class="form-control" placeholder="例如：鎖緊螺絲 / 更換零件" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1.25rem; width: auto; padding: 0.5rem 1.5rem;">新增紀錄</button>
            </form>
        </section>

        <!-- 歷史維修歷程清單 -->
        <section class="glass-card">
            <h3 style="margin-bottom: 1rem; font-size: 1.2rem; font-weight: 600; color: var(--text-main);">歷史維修歷程</h3>
            <div id="detailRecords" style="max-height: 400px; overflow-y: auto;">
                <div style="text-align: center; color: var(--text-muted); padding: 2rem;">
                    資料載入中...
                </div>
            </div>
        </section>

        <div style="margin-top: 2rem; margin-bottom: 3rem;">
            <button class="btn-primary" style="width: auto; padding: 0.5rem 1.5rem;" onclick="window.location.href='passport.html'">返回收藏庫</button>
        </div>
    </main>

    <script src="js/main.js?v=2026071816"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadMaintenancePage(); // 加載單一物品的維修歷史與表單事件
            
            // 預設將維修日期設為今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('recordDate').value = today;
        });
    </script>
</body>
</html>
