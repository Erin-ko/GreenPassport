<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | 綠色循環經濟護照</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                🌱 綠色循環經濟護照
            </div>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="glass-card auth-card" id="authCard">
            <!-- 登入表單 -->
            <div id="loginFormSection">
                <div class="auth-header">
                    <h2>歡迎回來</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">管理您的物品護照，實踐綠色永續生活</p>
                </div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">電子信箱</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密碼</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="請輸入密碼" required minlength="8">
                    </div>
                    <div id="loginError" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>
                    <button type="submit" class="btn-primary" style="width: 100%;">登入護照</button>
                </form>

                <div class="auth-toggle">
                    還沒有護照嗎？ <a onclick="toggleAuth(true)">點此註冊</a>
                </div>
            </div>

            <!-- 註冊表單 -->
            <div id="registerFormSection" style="display: none;">
                <div class="auth-header">
                    <h2>建立循環護照</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">開始為您的物品建立專屬數位履歷</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">使用者名稱</label>
                        <input type="text" id="regUsername" class="form-control" placeholder="請輸入名稱" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">電子信箱</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">密碼 (至少 8 碼)</label>
                        <input type="password" id="regPassword" class="form-control" placeholder="設定您的安全密碼" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="regLocation">粗略位置 (選填，作為互助看板距離基準)</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="regLocation" class="form-control" placeholder="可填郵遞區號，或使用定位">
                            <button type="button" class="btn-primary btn-sm" id="btnGetLocation" style="white-space: nowrap; padding: 0 1rem;">取得定位</button>
                        </div>
                        <small style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem; display: block;">我們僅會模糊化儲存坐標，以保護您的住家隱私。</small>
                    </div>
                    <div id="registerError" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>
                    <button type="submit" class="btn-primary" style="width: 100%;">註冊並開通</button>
                </form>

                <div class="auth-toggle">
                    已經有護照了？ <a onclick="toggleAuth(false)">點此登入</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js?v=2026071816"></script>
    <script>
        // 頁面內簡單的表單切換邏輯
        function toggleAuth(showRegister) {
            document.getElementById('loginFormSection').style.display = showRegister ? 'none' : 'block';
            document.getElementById('registerFormSection').style.display = showRegister ? 'block' : 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
        }
    </script>
</body>
</html>
